name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 取消同分支上正在跑的过期 build
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 快速门禁：frontmatter schema / 跨页链接 / 命名约定 / YAML 健康检查
  # 这个在 ~10 秒内跑完，让坏 PR 不必等 build
  verify:
    name: Verify (schema + links + naming)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run pnpm verify
        run: pnpm verify

  build:
    name: Build site
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check links (broken anchors / missing pages)
        run: |
          # 补充性检查：构建产物里的 href 是否都有对应 dist 文件
          # 这个检查比 verify 里的 markdown 链接自检覆盖面更广（涵盖了 mdx 渲染后的产物）
          # 仅作为告警，不阻塞 CI
          set +e
          fail=0
          for href in $(grep -rhoE 'href="/[^"#?]*"' dist/ | sort -u | sed 's/href="\(.*\)"/\1/'); do
            [[ "$href" == "/" ]] && continue
            [[ "$href" == /docs-assets/* ]] && continue
            [[ "$href" == /pagefind/* ]] && continue
            [[ "$href" == /_astro/* ]] && continue
            [[ "$href" == *.xml ]] && continue
            [[ "$href" == *.svg ]] && continue
            target="dist${href%/}/index.html"
            [[ ! -f "$target" && ! -f "dist${href}" ]] && echo "⚠ broken link: $href" && fail=1
          done
          exit 0
        shell: bash

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  # Fork 用户冷启动端到端测试 —— "模板对新课题组可用吗"的唯一真相
  # 当前 continue-on-error: true，因为已知有 27 broken link（Phase A2 修复中）
  # Phase C 完成后会改为 required
  smoke-test-fork:
    name: Smoke test (cold-fork user journey)
    needs: verify
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Simulate cold fork + init + first-week workflow + verify
        run: pnpm smoke-test:fork
