name: 📜 提名一篇论文
description: 推荐下一周共读的论文
title: "[提名] <论文标题>"
labels: ["nomination"]
body:
  - type: markdown
    attributes:
      value: |
        谢谢提名！我们每周日盘点一次提名清单，挑一篇定为下周共读主题。

  - type: input
    id: paper-title
    attributes:
      label: 论文标题
      placeholder: 例如：DeepSeek-V4 Technical Report
    validations:
      required: true

  - type: input
    id: paper-link
    attributes:
      label: 论文链接（arXiv / HuggingFace / 项目主页）
      placeholder: https://arxiv.org/abs/...
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 为什么值得读
      description: 1–3 条理由
      placeholder: |
        - 提出了 XXX 的新方法
        - 在 YYY benchmark 上超过 SOTA
        - 工程实现思路特别值得借鉴
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: 我可以贡献什么（多选）
      options:
        - label: 写一段背景介绍
        - label: 复现 / 测试关键实验
        - label: 翻译某节
        - label: 我只是想旁观学习

  - type: textarea
    id: notes
    attributes:
      label: 其他备注（可选）
